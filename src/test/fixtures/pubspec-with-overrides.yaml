name: example_app
description: A sample Flutter app with overrides
version: 1.0.0

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  http: ^1.6.0
  provider: ^6.1.5+1
  intl: ^0.18.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  mockito: ^5.4.0

dependency_overrides:
